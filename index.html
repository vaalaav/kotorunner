<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кошачьи Бега: Прогулка на Лужайке</title>
    <style>
        :root {
            --bg-color: #eaf4f4;
            --panel-bg: rgba(255, 255, 255, 0.92);
            --text-color: #2d3a2e;
            --accent-color: #e07a5f;
            --tg-color: #0088cc;
            --tg-hover: #0077b3;
            --lawn-green: #568c53;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 10px;
        }

        #game-container {
            position: relative;
            width: min(100vw, calc(100vh * 0.7 - 20px));
            height: min(100vh - 20px, calc(100vw / 0.7));
            max-width: 700px;
            max-height: 1000px;
            box-shadow: 0 20px 50px rgba(40, 60, 40, 0.25);
            border-radius: 24px;
            overflow: hidden;
            background: var(--lawn-green);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Экраны-оверлеи */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 241, 234, 0.96);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 25px;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Переключатель языка */
        #lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 12;
        }

        .lang-btn {
            background: #fff;
            border: 2px solid #cbd5e1;
            padding: 6px 12px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--lawn-green);
            color: white;
            border-color: var(--lawn-green);
        }

        h1 {
            font-size: 2.6rem;
            margin-bottom: 10px;
            color: #3d5a80;
            font-weight: 800;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            max-width: 90%;
            line-height: 1.4;
            color: #4c5c4e;
        }

        /* Информационные карточки (Гайд) */
        .guide-container {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 25px;
        }

        .guide-box {
            flex: 1;
            background: #fff;
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: left;
        }

        .guide-box h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 4px;
        }

        .guide-box.avoid h3 { color: #d90429; }
        .guide-box.collect h3 { color: #38b000; }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .guide-item span { font-size: 1.3rem; }

        /* Кнопки */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }

        .btn {
            background-color: var(--lawn-green);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(86, 140, 83, 0.3);
            transition: transform 0.1s, background-color 0.2s;
            width: 100%;
        }

        .btn:active { transform: scale(0.98); }

        .btn-tg {
            background-color: var(--tg-color);
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }
        .btn-tg:hover { background-color: var(--tg-hover); }

        /* Игровая панель */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 5;
            pointer-events: none;
        }

        .ui-box {
            background: var(--panel-bg);
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.05rem;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            backdrop-filter: blur(4px);
        }

        .instructions {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #6b705c;
            line-height: 1.3;
        }

        @media (max-width: 500px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 0.95rem; }
            .guide-container { flex-direction: column; gap: 8px; margin-bottom: 15px;}
            .guide-box { padding: 8px 12px; }
            .btn { padding: 12px 24px; font-size: 1.1rem; }
            #game-container { border-radius: 16px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="lang-switcher">
            <button class="lang-btn active" id="btn-ru" onclick="changeLanguage('ru')">RU</button>
            <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
        </div>

        <div id="ui-panel">
            <div class="ui-box"><span id="lbl-score">Очки</span>: <span id="score-val">0</span></div>
            <div class="ui-box"><span id="lbl-lives">Жизни</span>: <span id="lives-val">♥♥♥</span></div>
        </div>

        <div id="start-screen" class="overlay">
            <h1 id="txt-title">Кот на Лужайке</h1>
            <p id="txt-desc">Помоги пушистому безопасно погулять по саду!</p>
            
            <div class="guide-container">
                <div class="guide-box avoid">
                    <h3 id="txt-guide-avoid">Опасайся:</h3>
                    <div class="guide-item"><span>🐶</span><span id="item-dog">Пёсель</span></div>
                    <div class="guide-item"><span>📦</span><span id="item-box">Коробка</span></div>
                    <div class="guide-item"><span>🌿</span><span id="item-bush">Кусты</span></div>
                </div>
                <div class="guide-box collect">
                    <h3 id="txt-guide-collect">Собирай:</h3>
                    <div class="guide-item"><span>🐭</span><span id="item-mouse">Мышка (+15)</span></div>
                    <div class="guide-item"><span>🌭</span><span id="item-sausage">Сосиска (+10)</span></div>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn" id="start-btn">Погнали!</button>
            </div>
            <div class="instructions" id="txt-controls">
                Управление:<br>ПК: Стрелки Влево / Вправо<br>Смартфон: Тапы по краям экрана
            </div>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h1 id="txt-over-title">Игра Окончена</h1>
            <p><span id="txt-over-desc">Твой котик устал бегать.</span><br><span id="txt-over-res">Итоговый счёт:</span> <strong id="final-score">0</strong></p>
            
            <div class="btn-group">
                <button class="btn" id="restart-btn">Ещё раз</button>
                <button class="btn btn-tg" id="share-btn">Поделиться в Telegram</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="700" height="1000"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Локализация
    let currentLang = 'ru';
    const i18n = {
        ru: {
            lblScore: "Очки", lblLives: "Жизни", txtTitle: "Кот на Лужайке",
            txtDesc: "Помоги пушистому безопасно погулять по саду!", txtGuideAvoid: "Опасайся:",
            itemDog: "Пёсель", itemBox: "Коробка", itemBush: "Кусты", txtGuideCollect: "Собирай:",
            itemMouse: "Мышка (+15)", itemSausage: "Сосиска (+10)", startBtn: "Погнали!",
            txtControls: "Управление:<br>ПК: Стрелки Влево / Вправо<br>Смартфон: Тапы по краям экрана",
            txtOverTitle: "Игра Окончена", txtOverDesc: "Твой котик устал бегать.",
            txtOverRes: "Итоговый счёт:", restartBtn: "Ещё раз", shareBtn: "Поделиться в Telegram",
            shareMsg: "Мой кот зажег на лужайке и набрал {score} очков! Попробуй побить рекорд: "
        },
        en: {
            lblScore: "Score", lblLives: "Lives", txtTitle: "Cat on the Lawn",
            txtDesc: "Help the fluffy cat take a safe walk in the garden!", txtGuideAvoid: "Avoid:",
            itemDog: "Doggie", itemBox: "Box", itemBush: "Bushes", txtGuideCollect: "Collect:",
            itemMouse: "Mouse (+15)", itemSausage: "Sausage (+10)", startBtn: "Let's Go!",
            txtControls: "Controls:<br>PC: Left / Right Arrows<br>Smartphone: Tap left/right screen sides",
            txtOverTitle: "Game Over", txtOverDesc: "Your kitty is tired of running.",
            txtOverRes: "Final Score:", restartBtn: "Play Again", shareBtn: "Share to Telegram",
            shareMsg: "My cat rocked the lawn and scored {score} points! Try to beat me: "
        }
    };

    function changeLanguage(lang) {
        currentLang = lang;
        document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
        document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        
        // Обновление текстов на экранах
        const data = i18n[lang];
        document.getElementById('lbl-score').innerText = data.lblScore;
        document.getElementById('lbl-lives').innerText = data.lblLives;
        document.getElementById('txt-title').innerText = data.txtTitle;
        document.getElementById('txt-desc').innerText = data.txtDesc;
        document.getElementById('txt-guide-avoid').innerText = data.txtGuideAvoid;
        document.getElementById('item-dog').innerText = data.itemDog;
        document.getElementById('item-box').innerText = data.itemBox;
        document.getElementById('item-bush').innerText = data.itemBush;
        document.getElementById('txt-guide-collect').innerText = data.txtGuideCollect;
        document.getElementById('item-mouse').innerText = data.itemMouse;
        document.getElementById('item-sausage').innerText = data.itemSausage;
        document.getElementById('start-btn').innerText = data.startBtn;
        document.getElementById('txt-controls').innerHTML = data.txtControls;
        document.getElementById('txt-over-title').innerText = data.txtOverTitle;
        document.getElementById('txt-over-desc').innerText = data.txtOverDesc;
        document.getElementById('txt-over-res').innerText = data.txtOverRes;
        document.getElementById('restart-btn').innerText = data.restartBtn;
        document.getElementById('share-btn').innerText = data.shareBtn;
    }

    // Инициализация языка по умолчанию
    changeLanguage('ru');

    // Настройки геометрии лужайки
    const scaleFactor = 1.5;
    const laneWidth = 170; 
    const roadWidth = laneWidth * 3;
    const roadX = (canvas.width - roadWidth) / 2;
    const laneCenters = [
        roadX + laneWidth * 0.5,
        roadX + laneWidth * 1.5,
        roadX + laneWidth * 2.5
    ];

    // Мягкий баланс скорости
    const INITIAL_SPEED = 3.2;   
    const SPEED_INCREMENT = 0.15; 
    const SCORE_STEP = 150;       

    let gameActive = false;
    let score = 0;
    let lives = 3;
    let speed = INITIAL_SPEED;
    let entities = [];
    let spawnTimer = 0;
    let roadOffset = 0;

    let player = {
        currentLane: 1,
        x: laneCenters[1],
        y: canvas.height - 150,
        radius: 35,
        targetX: laneCenters[1],
        sideSpeed: 0.22,
        invulnerable: 0
    };

    // --- УПРАВЛЕНИЕ ---
    window.addEventListener('keydown', (e) => {
        if (!gameActive) return;
        if (e.key === 'ArrowLeft') movePlayer('left');
        if (e.key === 'ArrowRight') movePlayer('right');
    });

    function handleAction(clientX) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        const relativeX = clientX - rect.left;
        if (relativeX < rect.width / 2) movePlayer('left');
        else movePlayer('right');
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleAction(e.touches[0].clientX);
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
        handleAction(e.clientX);
    });

    function movePlayer(direction) {
        if (direction === 'left' && player.currentLane > 0) player.currentLane--;
        else if (direction === 'right' && player.currentLane < 2) player.currentLane++;
        player.targetX = laneCenters[player.currentLane];
    }

    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', startGame);
    
    // Кнопка Поделиться в Telegram
    document.getElementById('share-btn').addEventListener('click', () => {
        const gameUrl = window.location.href;
        const text = i18n[currentLang].shareMsg.replace('{score}', score);
        const tgLink = `https://t.me/share/url?url=${encodeURIComponent(gameUrl)}&text=${encodeURIComponent(text)}`;
        window.open(tgLink, '_blank');
    });

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('lang-switcher').classList.add('hidden'); // Скрываем смену языка в процессе игры
        score = 0;
        lives = 3;
        speed = INITIAL_SPEED;
        player.sideSpeed = 0.22;
        entities = [];
        player.currentLane = 1;
        player.x = laneCenters[1];
        player.targetX = laneCenters[1];
        player.invulnerable = 0;
        updateUI();
        gameActive = true;
    }

    function gameOver() {
        gameActive = false;
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('lang-switcher').classList.remove('hidden'); // Показываем выбор языка обратно
    }

    function updateUI() {
        document.getElementById('score-val').innerText = score;
        document.getElementById('lives-val').innerText = '♥'.repeat(Math.max(0, lives));
    }

    // --- ОТРИСОВКА ЛУЖАЙКИ ---
    function drawMeadow() {
        // Окружающий дикий газон
        ctx.fillStyle = '#477644';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Игровая зона (ухоженная лужайка)
        ctx.fillStyle = '#568c53';
        ctx.fillRect(roadX, 0, roadWidth, canvas.height);

        // Едва заметные разделители траекторий (светлая травка)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
        ctx.lineWidth = 4;
        ctx.setLineDash([15, 45]);
        ctx.lineDashOffset = -roadOffset;
        ctx.beginPath();
        ctx.moveTo(roadX + laneWidth, 0);
        ctx.lineTo(roadX + laneWidth, canvas.height);
        ctx.moveTo(roadX + laneWidth * 2, 0);
        ctx.lineTo(roadX + laneWidth * 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Эффект движения: пролетающие мимо цветочки
        ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
        for (let y = -40; y < canvas.height + 40; y += 160) {
            let currentY = y + (roadOffset * 1.8) % 160;
            // Левый край лужайки
            ctx.beginPath(); ctx.arc(roadX + 20, currentY, 4, 0, Math.PI * 2); ctx.fill();
            // Правый край лужайки
            ctx.beginPath(); ctx.arc(roadX + roadWidth - 20, currentY + 60, 4, 0, Math.PI * 2); ctx.fill();
        }
    }

    // --- ОТРИСОВКА ПЕРСОНАЖЕЙ ---
    function drawCat(x, y, isInvulnerable) {
        if (isInvulnerable && Math.floor(Date.now() / 100) % 2 === 0) return;
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scaleFactor, scaleFactor);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
        ctx.beginPath(); ctx.ellipse(0, 22, 20, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#e6a15c'; ctx.lineWidth = 6; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(-5, 10); ctx.quadraticCurveTo(-15, -15, -5, -25); ctx.stroke();
        ctx.fillStyle = '#f4a261';
        ctx.beginPath(); ctx.ellipse(0, 5, 18, 22, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(0, -15, 15, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#e76f51';
        ctx.beginPath(); ctx.moveTo(-13, -22); ctx.lineTo(-5, -32); ctx.lineTo(-2, -25); ctx.fill();
        ctx.beginPath(); ctx.moveTo(13, -22); ctx.lineTo(5, -32); ctx.lineTo(2, -25); ctx.fill();
        ctx.fillStyle = '#264653';
        ctx.beginPath(); ctx.arc(-5, -17, 2, 0, Math.PI * 2); ctx.arc(5, -17, 2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f4a261'; ctx.strokeStyle = '#e76f51'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(0, -12, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawDog(ctx, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scaleFactor, scaleFactor);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
        ctx.beginPath(); ctx.ellipse(0, 20, 22, 8, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#b5835a';
        ctx.beginPath(); ctx.ellipse(0, 0, 22, 20, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#6c584c';
        ctx.beginPath(); ctx.arc(0, -5, 14, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#4a3b32';
        ctx.beginPath(); ctx.ellipse(-12, -10, 6, 10, Math.PI/4, 0, Math.PI * 2); ctx.ellipse(12, -10, 6, 10, -Math.PI/4, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(-5, -8, 3.5, 0, Math.PI * 2); ctx.arc(5, -8, 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-5, -8, 1.5, 0, Math.PI * 2); ctx.arc(5, -8, 1.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawBox(ctx, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scaleFactor, scaleFactor);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)'; ctx.fillRect(-22, 20, 44, 8);
        let grad = ctx.createLinearGradient(-20, -20, 20, 20);
        grad.addColorStop(0, '#dda15e'); grad.addColorStop(1, '#bc6c25');
        ctx.fillStyle = grad; ctx.fillRect(-20, -20, 40, 40);
        ctx.strokeStyle = '#603808'; ctx.lineWidth = 2; ctx.strokeRect(-20, -20, 40, 40);
        ctx.beginPath(); ctx.moveTo(-16, -16); ctx.lineTo(16, 16); ctx.moveTo(16, -16); ctx.lineTo(-16, 16); ctx.stroke();
        ctx.restore();
    }

    function drawBush(ctx, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scaleFactor, scaleFactor);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
        ctx.beginPath(); ctx.ellipse(0, 18, 25, 10, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#2d6a4f';
        ctx.beginPath(); ctx.arc(-12, 2, 16, 0, Math.PI * 2); ctx.arc(12, 2, 16, 0, Math.PI * 2); ctx.arc(0, -10, 18, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#40916c';
        ctx.beginPath(); ctx.arc(-2, -12, 10, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawMouse(ctx, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scaleFactor, scaleFactor);
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath(); ctx.ellipse(0, 0, 14, 9, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#f87171';
        ctx.beginPath(); ctx.arc(-5, -8, 5, 0, Math.PI * 2); ctx.arc(5, -8, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#f87171'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, 9); ctx.quadraticCurveTo(8, 18, 4, 24); ctx.stroke();
        ctx.restore();
    }

    function drawSausage(ctx, x, y) {
        ctx.save(); ctx.translate(x, y); ctx.scale(scaleFactor, scaleFactor);
        ctx.rotate(Math.PI / 4);
        let grad = ctx.createLinearGradient(-8, -18, 8, 18);
        grad.addColorStop(0, '#ff87ab'); grad.addColorStop(1, '#f15bb5');
        ctx.fillStyle = grad;
        ctx.beginPath(); ctx.roundRect(-8, -18, 16, 36, 8); ctx.fill();
        ctx.restore();
    }

    // --- ДВИЖОК ИГРЫ ---
    function spawnEntity() {
        spawnTimer++;
        if (spawnTimer > Math.max(35, 110 - speed * 8)) {
            spawnTimer = 0;
            let lane = Math.floor(Math.random() * 3);
            let rand = Math.random();
            let type;
            
            if (rand < 0.35) type = 'dog';
            else if (rand < 0.55) type = 'box';
            else if (rand < 0.65) type = 'bush';
            else if (rand < 0.85) type = 'mouse';
            else type = 'sausage';

            let clearLane = true;
            entities.forEach(e => {
                if (e.lane === lane && e.y < 200) clearLane = false;
            });

            if (clearLane) {
                let isScoreBonus = type === 'mouse' || type === 'sausage';
                entities.push({
                    x: laneCenters[lane], y: -60, lane: lane, type: type,
                    radius: isScoreBonus ? 25 : 33, isScoreBonus: isScoreBonus
                });
            }
        }
    }

    function update() {
        if (!gameActive) return;

        roadOffset += speed;
        if (roadOffset > 160) roadOffset = 0;

        player.x += (player.targetX - player.x) * player.sideSpeed;
        if (player.invulnerable > 0) player.invulnerable--;

        for (let i = entities.length - 1; i >= 0; i--) {
            let e = entities[i];
            e.y += speed;

            let distX = player.x - e.x;
            let distY = player.y - e.y;
            let distance = Math.sqrt(distX * distX + distY * distY);

            if (distance < player.radius + e.radius) {
                if (e.isScoreBonus) {
                    let points = e.type === 'mouse' ? 15 : 10;
                    addScore(points);
                    entities.splice(i, 1);
                } else {
                    if (player.invulnerable === 0) {
                        lives--;
                        player.invulnerable = 90;
                        updateUI();
                        if (lives <= 0) gameOver();
                    }
                }
                continue;
            }

            if (e.y > canvas.height + 60) {
                if (!e.isScoreBonus) addScore(1); 
                entities.splice(i, 1);
            }
        }
        spawnEntity();
    }

    function addScore(points) {
        let oldScore = score;
        score += points;
        updateUI();

        if (Math.floor(score / SCORE_STEP) > Math.floor(oldScore / SCORE_STEP)) {
            speed += SPEED_INCREMENT;
            player.sideSpeed = Math.min(0.45, player.sideSpeed + 0.01); 
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawMeadow();
        entities.forEach(e => {
            if (e.type === 'dog') drawDog(ctx, e.x, e.y);
            else if (e.type === 'box') drawBox(ctx, e.x, e.y);
            else if (e.type === 'bush') drawBush(ctx, e.x, e.y);
            else if (e.type === 'mouse') drawMouse(ctx, e.x, e.y);
            else if (e.type === 'sausage') drawSausage(ctx, e.x, e.y);
        });
        drawCat(player.x, player.y, player.invulnerable > 0);
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
